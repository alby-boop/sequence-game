<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sequence — Daily Puzzle</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:     #0f0f11;
      --surf:   #1c1c1f;
      --surf2:  #2a2a2e;
      --border: #3a3a3e;
      --accent: #7c6fff;
      --text:   #f2f2f7;
      --muted:  #8e8e93;
      --green:  #30d158;
      --yellow: #ffd60a;
      --orange: #ff9f0a;
      --red:    #ff453a;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px 16px;
    }

    .wrap { width:100%; max-width:440px; }

    /* ── HEADER ── */
    .hdr { text-align:center; margin-bottom:22px; }
    .hdr h1 {
      font-size:28px; font-weight:800; letter-spacing:7px; text-transform:uppercase;
      background: linear-gradient(135deg,#fff 0%,#a78bfa 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .hdr-date { font-size:12px; color:var(--muted); margin-top:5px; letter-spacing:.8px; text-transform:uppercase; }

    /* ── MINI STATS ── */
    .mini-stats { display:flex; justify-content:center; gap:32px; margin-bottom:24px; }
    .ms { text-align:center; }
    .ms-v { font-size:20px; font-weight:700; color:var(--accent); }
    .ms-l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-top:2px; }

    /* ── MODE PICKER ── */
    .picker-lbl {
      text-align:center; font-size:12px; color:var(--muted);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:14px;
    }
    .mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .mode-card {
      background:var(--surf); border:2px solid var(--border);
      border-radius:16px; padding:16px 14px; cursor:pointer;
      transition:border-color .2s, box-shadow .2s, transform .1s;
    }
    .mode-card:hover  { transform:scale(1.02); }
    .mode-card:active { transform:scale(.97); }
    .mode-card.active { /* border + glow set via JS */ }
    .mc-dot {
      width:10px; height:10px; border-radius:50%;
      display:inline-block; margin-bottom:9px;
    }
    .mc-name { display:block; font-size:14px; font-weight:700; margin-bottom:3px; }
    .mc-time { font-size:12px; color:var(--muted); }

    /* ── STREAK CIRCLE ── */
    .streak-wrap {
      display:flex; flex-direction:column; align-items:center; margin-bottom:18px;
    }
    .ring-container { position:relative; width:104px; height:104px; }
    .ring-svg { transform:rotate(-90deg); }
    .r-track { fill:none; stroke:var(--surf2); stroke-width:6; }
    .r-arc   { fill:none; stroke-width:6; stroke-linecap:round;
               transition:stroke-dashoffset 1s linear; }
    .ring-inner {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center; line-height:1;
    }
    .ring-num  { font-size:30px; font-weight:800; }
    .ring-time {
      font-size:11px; color:var(--muted); margin-top:3px;
      font-variant-numeric:tabular-nums; letter-spacing:.5px;
    }
    .streak-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-top:8px; }

    @keyframes pulse {
      0%,100% { transform:translate(-50%,-50%) scale(1); }
      50%      { transform:translate(-50%,-50%) scale(1.12); }
    }
    .ring-inner.urgent { animation:pulse .55s ease infinite; }

    /* ── PUZZLE META ── */
    .meta {
      display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
    }
    .meta-day { font-size:13px; color:var(--muted); }
    .badge {
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:1px; padding:4px 12px; border-radius:20px;
    }
    .badge.easy   { background:rgba(48,209,88,.14);  color:var(--green);  }
    .badge.medium { background:rgba(255,214,10,.14); color:var(--yellow); }
    .badge.hard   { background:rgba(255,159,10,.14); color:var(--orange); }
    .badge.expert { background:rgba(255,69,58,.14);  color:var(--red);    }

    /* ── SEQUENCE CARD ── */
    .seq-card {
      background:var(--surf); border:1px solid var(--border);
      border-radius:20px; padding:26px 18px; margin-bottom:18px;
    }
    .seq-row { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:5px; }
    .chip {
      background:var(--surf2); border:1px solid var(--border);
      border-radius:10px; padding:9px 13px; font-size:19px; font-weight:700;
      min-width:50px; text-align:center; opacity:0;
    }
    .chip.q   { background:var(--accent); border-color:var(--accent); color:#fff; font-size:21px; }
    .chip.pop { animation:popIn .35s cubic-bezier(.175,.885,.32,1.275) forwards; }
    .comma    { color:var(--muted); font-size:15px; align-self:center; }
    @keyframes popIn {
      from { opacity:0; transform:scale(.65) translateY(8px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    /* ── INPUT ── */
    .inp-label { font-size:12px; color:var(--muted); text-align:center; margin-bottom:9px; }
    .answer {
      width:100%; background:var(--surf); border:2px solid var(--border);
      border-radius:14px; padding:15px; font-size:26px; font-weight:700;
      color:var(--text); text-align:center; outline:none;
      transition:border-color .2s, box-shadow .2s;
      -moz-appearance:textfield; margin-bottom:11px; letter-spacing:2px;
    }
    .answer::-webkit-inner-spin-button,
    .answer::-webkit-outer-spin-button { -webkit-appearance:none; }
    .answer::placeholder { font-size:15px; font-weight:400; letter-spacing:0; color:var(--muted); }
    .answer:focus   { border-color:var(--accent); box-shadow:0 0 0 4px rgba(124,111,255,.2); }
    .answer.correct { border-color:var(--green);  box-shadow:0 0 0 4px rgba(48,209,88,.2);  color:var(--green); }
    .answer.wrong   { border-color:var(--red);    box-shadow:0 0 0 4px rgba(255,69,58,.2);  color:var(--red);   }

    /* ── BUTTON ── */
    .btn {
      width:100%; background:var(--accent); color:#fff; border:none;
      border-radius:14px; padding:16px; font-size:15px; font-weight:700;
      letter-spacing:.8px; cursor:pointer; text-transform:uppercase;
      transition:opacity .2s, transform .1s;
    }
    .btn:hover:not(:disabled)  { opacity:.87; }
    .btn:active:not(:disabled) { transform:scale(.98); }
    .btn:disabled { opacity:.3; cursor:default; }

    /* ── RESULT PANEL ── */
    .result {
      display:none; background:var(--surf); border:1px solid var(--border);
      border-radius:20px; padding:22px; margin-top:14px; text-align:center;
    }
    .result.show { display:block; animation:slideUp .38s cubic-bezier(.16,1,.3,1); }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .res-icon  { font-size:42px; margin-bottom:9px; }
    .res-title { font-size:19px; font-weight:700; margin-bottom:5px; }
    .res-title.ok { color:var(--green); }
    .res-title.no { color:var(--red); }
    .res-sub   { font-size:13px; color:var(--muted); margin-bottom:16px; }

    /* ── SHARE CARD ── */
    .share-preview {
      background:var(--surf2); border-radius:12px; padding:14px 16px;
      margin-bottom:12px; font-size:14px; line-height:1.8;
      text-align:left; color:var(--text); white-space:pre-wrap;
    }
    .copy-btn {
      width:100%; background:var(--surf2); color:var(--text);
      border:1px solid var(--border); border-radius:12px;
      padding:13px; font-size:13px; font-weight:600; cursor:pointer;
      transition:background .2s, color .2s, border-color .2s;
      margin-bottom:14px; letter-spacing:.3px;
    }
    .copy-btn:hover { background:var(--border); }
    .copy-btn.copied { color:var(--green); border-color:var(--green); }

    .rule-box { background:var(--surf2); border-radius:12px; padding:15px; text-align:left; }
    .rule-lbl { font-size:10px; font-weight:700; text-transform:uppercase;
                letter-spacing:1.1px; color:var(--accent); margin-bottom:5px; }
    .rule-txt { font-size:14px; line-height:1.6; }

    /* ── DONE PAGE ── */
    #donePage { display:none; text-align:center; }
    .done-icon  { font-size:52px; margin-bottom:12px; }
    .done-title { font-size:21px; font-weight:700; color:var(--green); margin-bottom:6px; }
    .done-sub   { font-size:14px; color:var(--muted); margin-bottom:22px; }
    .cd-lbl  { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:5px; }
    .cd-time { font-size:36px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; margin-bottom:24px; }
    .done-card {
      background:var(--surf); border:1px solid var(--border);
      border-radius:18px; padding:20px; text-align:left;
    }
    .done-outcome { font-size:15px; font-weight:600; margin-bottom:14px; }
    .done-outcome.ok { color:var(--green); }
    .done-outcome.no { color:var(--red); }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <h1>Sequence</h1>
    <div class="hdr-date" id="hdrDate"></div>
  </div>

  <!-- MINI STATS -->
  <div class="mini-stats">
    <div class="ms"><div class="ms-v" id="sSolved">0</div><div class="ms-l">Solved</div></div>
    <div class="ms"><div class="ms-v" id="sAcc">—</div><div class="ms-l">Accuracy</div></div>
  </div>

  <!-- MODE PICKER -->
  <div id="modePicker">
    <div class="picker-lbl">Choose your mode</div>
    <div class="mode-grid">
      <div class="mode-card" id="mc-Easy"   onclick="selectMode('Easy')">
        <span class="mc-dot" style="background:var(--green)"></span>
        <span class="mc-name">Easy</span>
        <span class="mc-time">2 minutes</span>
      </div>
      <div class="mode-card" id="mc-Medium" onclick="selectMode('Medium')">
        <span class="mc-dot" style="background:var(--yellow)"></span>
        <span class="mc-name">Medium</span>
        <span class="mc-time">1 minute</span>
      </div>
      <div class="mode-card" id="mc-Hard"   onclick="selectMode('Hard')">
        <span class="mc-dot" style="background:var(--orange)"></span>
        <span class="mc-name">Hard</span>
        <span class="mc-time">30 seconds</span>
      </div>
      <div class="mode-card" id="mc-Expert" onclick="selectMode('Expert')">
        <span class="mc-dot" style="background:var(--red)"></span>
        <span class="mc-name">Expert</span>
        <span class="mc-time">15 seconds</span>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="gamePage" style="display:none;">

    <!-- Streak circle -->
    <div class="streak-wrap">
      <div class="ring-container">
        <svg width="104" height="104" class="ring-svg">
          <circle class="r-track" cx="52" cy="52" r="44"/>
          <circle class="r-arc" id="rArc" cx="52" cy="52" r="44"
            stroke-dasharray="276.5" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-inner" id="ringInner">
          <div class="ring-num"  id="ringNum">0</div>
          <div class="ring-time" id="ringTime"></div>
        </div>
      </div>
      <div class="streak-label" id="streakLabel">day streak</div>
    </div>

    <!-- Puzzle meta -->
    <div class="meta">
      <div class="meta-day" id="metaDay"></div>
      <div class="badge"    id="metaBadge"></div>
    </div>

    <!-- Sequence -->
    <div class="seq-card">
      <div class="seq-row" id="seqRow"></div>
    </div>

    <!-- Input -->
    <div class="inp-label">What comes next?</div>
    <input type="number" id="ans" class="answer" placeholder="Type your answer…" autocomplete="off"/>
    <button class="btn" id="subBtn">Submit Answer</button>

    <!-- Result -->
    <div class="result" id="result">
      <div class="res-icon"  id="resIcon"></div>
      <div class="res-title" id="resTitle"></div>
      <div class="res-sub"   id="resSub"></div>
      <div class="share-preview" id="sharePreview"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyShare()">📋 Copy result to share</button>
      <div class="rule-box">
        <div class="rule-lbl">The Pattern</div>
        <div class="rule-txt" id="resRule"></div>
      </div>
    </div>

  </div>

  <!-- DONE PAGE -->
  <div id="donePage">
    <div class="done-icon">✓</div>
    <div class="done-title">Puzzle Complete</div>
    <div class="done-sub">Come back tomorrow for the next sequence.</div>
    <div class="cd-lbl">Next puzzle in</div>
    <div class="cd-time" id="cdTime">--:--:--</div>
    <div class="done-card">
      <div class="done-outcome" id="doneOutcome"></div>
      <div class="share-preview" id="doneSharePreview"></div>
      <button class="copy-btn" id="doneCopyBtn" onclick="copyDoneShare()">📋 Copy result to share</button>
      <div class="rule-lbl" style="margin-top:4px;">The Pattern</div>
      <div class="rule-txt" id="doneRule"></div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   PUZZLE LIBRARY — 28 days, 4 weeks
   ═══════════════════════════════════════ */
const P = [
  // WEEK 1 — Easy → Hard
  { w:1,d:1, seq:[3,4,7,11,18], ans:29,
    rule:"Fibonacci-style — each number is the sum of the two before it: 3+4=7, 4+7=11, 7+11=18, 11+18=29",
    diff:"Easy" },
  { w:1,d:2, seq:[2,5,10,17,26], ans:37,
    rule:"Each term is n²+1: 1²+1=2, 2²+1=5, 3²+1=10, 4²+1=17, 5²+1=26, 6²+1=37 — look at the gaps between numbers",
    diff:"Easy" },
  { w:1,d:3, seq:[1,3,7,13,21], ans:31,
    rule:"Add increasing even numbers each step: +2, +4, +6, +8, +10… the gap grows by 2 each time",
    diff:"Easy" },
  { w:1,d:4, seq:[10,11,13,16,20], ans:25,
    rule:"Add increasing amounts: +1, +2, +3, +4, +5… the gap between terms grows by 1 each time",
    diff:"Easy" },
  { w:1,d:5, seq:[3,9,7,21,19,57], ans:55,
    rule:"Alternating operations — multiply by 3, then subtract 2, repeating: ×3, −2, ×3, −2… (57−2=55)",
    diff:"Medium" },
  { w:1,d:6, seq:[5,11,19,29,41], ans:55,
    rule:"Differences between terms increase by 2 each step: +6, +8, +10, +12, +14… look at the gaps",
    diff:"Medium" },
  { w:1,d:7, seq:[2,4,12,48], ans:240,
    rule:"The multiplier increases by 1 each time: ×2, ×3, ×4, ×5 (2→4→12→48→240)",
    diff:"Hard" },

  // WEEK 2 — Easy → Hard
  { w:2,d:1, seq:[2,5,7,12,19], ans:31,
    rule:"Fibonacci-style — each number is the sum of the two before it: 2+5=7, 5+7=12, 7+12=19, 12+19=31",
    diff:"Easy" },
  { w:2,d:2, seq:[1,3,6,11,18], ans:29,
    rule:"Add consecutive prime numbers: +2, +3, +5, +7, +11… each amount added is the next prime",
    diff:"Medium" },
  { w:2,d:3, seq:[3,8,15,24,35], ans:48,
    rule:"Each term is n×(n+2): 1×3=3, 2×4=8, 3×5=15, 4×6=24, 5×7=35, 6×8=48",
    diff:"Medium" },
  { w:2,d:4, seq:[4,6,12,14,28,30], ans:60,
    rule:"Alternating operations — add 2, then multiply by 2, repeating: +2, ×2, +2, ×2… (30×2=60)",
    diff:"Medium" },
  { w:2,d:5, seq:[2,5,11,23,47], ans:95,
    rule:"Multiply by 2, then add 1 each time (×2 + 1): 2→5→11→23→47→95",
    diff:"Hard" },
  { w:2,d:6, seq:[1,8,27,64,125], ans:216,
    rule:"Perfect cubes — 1³=1, 2³=8, 3³=27, 4³=64, 5³=125, 6³=216",
    diff:"Hard" },
  { w:2,d:7, seq:[2,8,18,32,50], ans:72,
    rule:"Each term is 2×n²: 2×1²=2, 2×2²=8, 2×3²=18, 2×4²=32, 2×5²=50, 2×6²=72",
    diff:"Hard" },

  // WEEK 3 — Medium → Expert
  { w:3,d:1, seq:[4,7,11,18,29], ans:47,
    rule:"Fibonacci-style — each number is the sum of the two before it: 4+7=11, 7+11=18, 11+18=29, 18+29=47",
    diff:"Medium" },
  { w:3,d:2, seq:[6,10,15,21,28], ans:36,
    rule:"Add increasing amounts: +4, +5, +6, +7, +8… the gap grows by 1 each step",
    diff:"Medium" },
  { w:3,d:3, seq:[1,2,4,7,11,16], ans:22,
    rule:"Add increasing amounts: +1, +2, +3, +4, +5, +6… each step adds one more than the last",
    diff:"Medium" },
  { w:3,d:4, seq:[3,7,15,31,63], ans:127,
    rule:"Multiply by 2, then add 1 each time (×2 + 1): 3→7→15→31→63→127",
    diff:"Hard" },
  { w:3,d:5, seq:[1,1,2,3,5,8], ans:13,
    rule:"Fibonacci — each number is the sum of the two before it: 1+1=2, 1+2=3, 2+3=5, 3+5=8, 5+8=13",
    diff:"Hard" },
  { w:3,d:6, seq:[4,9,25,49,121], ans:169,
    rule:"Squares of prime numbers: 2²=4, 3²=9, 5²=25, 7²=49, 11²=121, 13²=169",
    diff:"Hard" },
  { w:3,d:7, seq:[2,9,28,65,126], ans:217,
    rule:"Each term is n³+1: 1³+1=2, 2³+1=9, 3³+1=28, 4³+1=65, 5³+1=126, 6³+1=217",
    diff:"Expert" },

  // WEEK 4 — Medium-Hard → Expert
  { w:4,d:1, seq:[5,10,20,35,55], ans:80,
    rule:"Add increasing multiples of 5: +5, +10, +15, +20, +25… the gap grows by 5 each step",
    diff:"Medium" },
  { w:4,d:2, seq:[1,4,13,40,121], ans:364,
    rule:"Multiply by 3, then add 1 each time (×3 + 1): 1→4→13→40→121→364",
    diff:"Hard" },
  { w:4,d:3, seq:[1,2,6,24,120], ans:720,
    rule:"Factorials — multiply by the next integer each time: ×2, ×3, ×4, ×5, ×6… (1!, 2!, 3!, 4!, 5!, 6!)",
    diff:"Hard" },
  { w:4,d:4, seq:[8,13,21,34,55], ans:89,
    rule:"Fibonacci — each number is the sum of the two before it (starting mid-sequence): 8+13=21, 13+21=34, 21+34=55, 34+55=89",
    diff:"Hard" },
  { w:4,d:5, seq:[3,6,11,18,27,38], ans:51,
    rule:"Each term is n²+2: 1²+2=3, 2²+2=6, 3²+2=11, 4²+2=18, 5²+2=27, 6²+2=38, 7²+2=51",
    diff:"Expert" },
  { w:4,d:6, seq:[1,5,14,30,55], ans:91,
    rule:"Cumulative sum of squares — each step adds the next perfect square: 1², +2²=5, +3²=14, +4²=30, +5²=55, +6²=91",
    diff:"Expert" },
  { w:4,d:7, seq:[2,12,36,80,150], ans:252,
    rule:"Each term is n²×(n+1): 1²×2=2, 2²×3=12, 3²×4=36, 4²×5=80, 5²×6=150, 6²×7=252",
    diff:"Expert" },
];

/* ═══ CONFIG ═══ */
const START      = new Date('2026-06-22T00:00:00');
const CIRC       = 2 * Math.PI * 44;   // r=44 → 276.46
const DIFF_TIME  = { Easy:120, Medium:60, Hard:30, Expert:15 };
const MODE_COLOR = { Easy:'#30d158', Medium:'#ffd60a', Hard:'#ff9f0a', Expert:'#ff453a' };
const MODE_GLOW  = { Easy:'rgba(48,209,88,.25)', Medium:'rgba(255,214,10,.25)', Hard:'rgba(255,159,10,.25)', Expert:'rgba(255,69,58,.25)' };
const MODE_EMOJI = { Easy:'🟢', Medium:'🟡', Hard:'🟠', Expert:'🔴' };

/* ═══ STATE ═══ */
let mode  = null;
let TOTAL = 15;
let left  = TOTAL;
let tid   = null;
let over  = false;
let _shareText = '';

/* ═══ UTILS ═══ */
function todayIdx() {
  const now  = new Date();
  const t    = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const s    = new Date(START.getFullYear(), START.getMonth(), START.getDate());
  const diff = Math.floor((t - s) / 86400000);
  return ((diff % P.length) + P.length) % P.length;
}
function dayKey()   { const n=new Date(); return `seq_${n.getFullYear()}_${n.getMonth()}_${n.getDate()}`; }
function loadStats(){ return JSON.parse(localStorage.getItem('seq_stats')||'{"streak":0,"solved":0,"played":0,"lastDate":null}'); }
function saveStats(s){ localStorage.setItem('seq_stats', JSON.stringify(s)); }

function renderMiniStats() {
  const s = loadStats();
  document.getElementById('sSolved').textContent = s.solved;
  document.getElementById('sAcc').textContent    = s.played ? Math.round(s.solved/s.played*100)+'%' : '—';
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function fmtTime(sec) {
  if (sec >= 60) { const m=Math.floor(sec/60), s=String(sec%60).padStart(2,'0'); return `${m}:${s}`; }
  return `${sec}s`;
}

/* ═══ SHARE HELPERS ═══ */
function speedRating(timeLeft, total) {
  const pct = timeLeft / total;
  if (pct > 0.75) return '⚡⚡⚡';
  if (pct > 0.50) return '⚡⚡';
  if (pct > 0.25) return '⚡';
  if (pct > 0.05) return '✓';
  return '🎯'; // clutch
}

function emojiBar(timeLeft, total) {
  const blocks = 8;
  const green  = Math.max(0, Math.round((timeLeft / total) * blocks));
  return '🟩'.repeat(green) + '⬛'.repeat(blocks - green);
}

function buildShareText(puzzle, m, timeLeft, total, streak, correct) {
  const emoji  = MODE_EMOJI[m];
  const result = correct ? `${streak}-day streak` : 'Better luck tomorrow';
  return `🔢 Sequence\n${emoji} ${result}`;
}

/* ═══ RING / TIMER ═══ */
const rArc   = document.getElementById('rArc');
const ringInner = document.getElementById('ringInner');
const ringTime  = document.getElementById('ringTime');

function paintRing() {
  const frac = left / TOTAL;
  rArc.style.strokeDashoffset = CIRC * (1 - frac);
  ringTime.textContent = fmtTime(left);
  if (left <= 5) ringInner.classList.add('urgent');
  else           ringInner.classList.remove('urgent');
}

function startTimer() {
  paintRing();
  tid = setInterval(() => {
    left--;
    paintRing();
    if (left <= 0) { clearInterval(tid); finish(null); }
  }, 1000);
}

/* ═══ MODE PICKER ═══ */
function selectMode(m) {
  mode = m;
  localStorage.setItem('seq_pref_mode', m);

  // Transition to game
  document.getElementById('modePicker').style.display = 'none';
  document.getElementById('gamePage').style.display   = 'block';

  // Apply mode color to ring
  rArc.style.stroke = MODE_COLOR[m];

  // Set streak display
  const stats = loadStats();
  document.getElementById('ringNum').textContent   = stats.streak;
  document.getElementById('streakLabel').textContent =
    stats.streak === 1 ? '1-day streak' : `${stats.streak}-day streak`;

  // Set timer
  TOTAL = DIFF_TIME[m];
  left  = TOTAL;
  paintRing();

  // Puzzle meta
  const puzzle = P[todayIdx()];
  document.getElementById('metaDay').textContent = `Week ${puzzle.w} — Day ${puzzle.d}`;
  const badge = document.getElementById('metaBadge');
  badge.textContent = puzzle.diff;
  badge.className   = 'badge ' + puzzle.diff.toLowerCase();

  // Render sequence then start timer
  renderSeq(puzzle.seq);
  const delay = puzzle.seq.length * 80 + 420;
  setTimeout(() => {
    document.getElementById('ans').focus();
    startTimer();
  }, delay);

  document.getElementById('ans').addEventListener('keydown', e => { if (e.key==='Enter') submit(); });
  document.getElementById('subBtn').addEventListener('click', submit);
}

/* ═══ SEQUENCE ═══ */
function renderSeq(seq) {
  const row = document.getElementById('seqRow');
  row.innerHTML = '';
  [...seq, '?'].forEach((v, i) => {
    if (i > 0) {
      const c = document.createElement('span');
      c.className='comma'; c.textContent=','; row.appendChild(c);
    }
    const chip = document.createElement('div');
    chip.className = 'chip' + (i===seq.length ? ' q' : '');
    chip.textContent = v;
    setTimeout(() => chip.classList.add('pop'), i*80);
    row.appendChild(chip);
  });
}

/* ═══ FINISH ═══ */
function finish(userVal) {
  if (over) return;
  over = true;
  clearInterval(tid);

  const puzzle  = P[todayIdx()];
  const correct = userVal !== null && userVal === puzzle.ans;
  const inp     = document.getElementById('ans');
  const btn     = document.getElementById('subBtn');

  inp.disabled  = true;
  inp.className = 'answer ' + (correct ? 'correct' : 'wrong');
  btn.disabled  = true;
  btn.textContent = 'See you tomorrow!';

  // Stop ring animation
  rArc.style.transition = 'none';
  ringInner.classList.remove('urgent');

  // Update stats
  const stats    = loadStats();
  if (correct) stats.solved++;
  stats.played++;
  const todayStr = new Date().toDateString();
  const yest     = new Date(); yest.setDate(yest.getDate()-1);
  if (correct) {
    stats.streak = (stats.lastDate === yest.toDateString()) ? stats.streak+1 : 1;
  } else {
    stats.streak = 0;
  }
  stats.lastDate = todayStr;
  saveStats(stats);
  renderMiniStats();

  // Update streak circle to final streak
  document.getElementById('ringNum').textContent = stats.streak;
  document.getElementById('streakLabel').textContent =
    stats.streak === 1 ? '1-day streak' : `${stats.streak}-day streak`;

  // Build share text
  _shareText = buildShareText(puzzle, mode, left, TOTAL, stats.streak, correct);

  // Result panel
  const panel = document.getElementById('result');
  document.getElementById('resIcon').textContent  = correct ? '🎉' : (userVal===null ? '⏱️' : '😬');
  const rt = document.getElementById('resTitle');
  rt.className  = 'res-title ' + (correct ? 'ok' : 'no');
  rt.textContent = correct ? 'Correct!' : (userVal===null ? "Time's Up!" : 'Not quite.');
  document.getElementById('resSub').textContent   =
    correct ? `The answer is ${puzzle.ans}.` : `The answer was ${puzzle.ans}.`;
  document.getElementById('sharePreview').textContent = _shareText;
  document.getElementById('resRule').textContent  = puzzle.rule;
  panel.classList.add('show');

  // Persist
  localStorage.setItem(dayKey(), JSON.stringify({
    correct, ans:puzzle.ans, rule:puzzle.rule,
    mode, timeLeft:left, total:TOTAL, streak:stats.streak,
    shareText:_shareText
  }));
}

/* ═══ COPY ═══ */
function copyShare() {
  navigator.clipboard.writeText(_shareText).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent='📋 Copy result to share'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyDoneShare() {
  const text = document.getElementById('doneSharePreview').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('doneCopyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent='📋 Copy result to share'; btn.classList.remove('copied'); }, 2000);
  });
}

/* ═══ SUBMIT ═══ */
function submit() {
  const v = parseInt(document.getElementById('ans').value, 10);
  if (isNaN(v)) { document.getElementById('ans').focus(); return; }
  finish(v);
}

/* ═══ DONE PAGE ═══ */
function showDone(saved) {
  document.getElementById('modePicker').style.display = 'none';
  document.getElementById('donePage').style.display   = 'block';

  const outcome = document.getElementById('doneOutcome');
  outcome.className   = 'done-outcome ' + (saved.correct ? 'ok' : 'no');
  outcome.textContent = saved.correct ? '✓ You solved it!' : `✗ The answer was ${saved.ans}`;

  document.getElementById('doneSharePreview').textContent =
    saved.shareText || `🔢 Sequence\n${saved.correct ? '✓ Correct' : '✗ Missed it'}\n🔥 ${saved.streak}-day streak`;
  document.getElementById('doneRule').textContent = saved.rule || '';

  function tick() {
    const now  = new Date();
    const next = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
    const ms   = next - now;
    const h = String(Math.floor(ms/3600000)).padStart(2,'0');
    const m = String(Math.floor((ms%3600000)/60000)).padStart(2,'0');
    const s = String(Math.floor((ms%60000)/1000)).padStart(2,'0');
    document.getElementById('cdTime').textContent = `${h}:${m}:${s}`;
  }
  tick(); setInterval(tick, 1000);
}

/* ═══ INIT ═══ */
function init() {
  document.getElementById('hdrDate').textContent = fmtDate(new Date());
  renderMiniStats();

  // Already played today?
  const saved = localStorage.getItem(dayKey());
  if (saved) { showDone(JSON.parse(saved)); return; }

  // Highlight previously used mode
  const pref = localStorage.getItem('seq_pref_mode');
  if (pref) {
    const card = document.getElementById('mc-'+pref);
    if (card) {
      card.style.borderColor = MODE_COLOR[pref];
      card.style.boxShadow   = `0 0 0 3px ${MODE_GLOW[pref]}`;
    }
  }
}

init();
</script>
